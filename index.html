<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="CodeForge - Master TCS NQT coding, aptitude, reasoning & verbal questions with an interactive coding platform powered by AI." />
  <title>CodeForge — TCS NQT Practice Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="/favicon.ico" />

  <!-- Monaco Editor -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css" />

  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="app">
    <!-- Navigation -->
    <nav id="main-nav">
      <div class="nav-brand">
        <i class="fas fa-fire-flame-curved"></i>
        <span class="brand-text">Code<span class="accent">Forge</span></span>
      </div>
      <div class="nav-links">
        <a href="#/" class="nav-link active" data-page="home">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="#/problems" class="nav-link" data-page="problems">
          <i class="fas fa-code"></i> Problems
        </a>
        <a href="#/submissions" class="nav-link" data-page="submissions">
          <i class="fas fa-file-alt"></i> Submissions
        </a>
        <a href="#/settings" class="nav-link" data-page="settings">
          <i class="fas fa-gear"></i> Settings
        </a>
      </div>
      <div class="nav-actions">
        <button id="ai-toggle-btn" class="btn-glow" title="Toggle AI Assistant">
          <i class="fas fa-robot"></i> AI Assistant
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="page-content"></main>

    <!-- AI Chat Sidebar -->
    <aside id="ai-sidebar" class="closed">
      <div class="ai-sidebar-header">
        <div class="ai-title">
          <i class="fas fa-robot"></i>
          <span>AI Assistant</span>
        </div>
        <div class="ai-provider-toggle">
          <button class="ai-provider active" data-provider="groq" title="Fast responses">
            <i class="fas fa-bolt"></i> Groq
          </button>
          <button class="ai-provider" data-provider="gemini" title="Deep analysis">
            <i class="fas fa-gem"></i> Gemini
          </button>
        </div>
        <button id="ai-close-btn"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="ai-quick-actions">
        <button class="quick-action" data-action="explain">💡 Explain Problem</button>
        <button class="quick-action" data-action="hint">🔑 Give Hint</button>
        <button class="quick-action" data-action="debug">🐛 Debug Code</button>
        <button class="quick-action" data-action="approach">📋 Solution Approach</button>
      </div>
      <div id="ai-messages" class="ai-messages"></div>
      <div class="ai-input-area">
        <textarea id="ai-input" placeholder="Ask anything about coding..." rows="2"></textarea>
        <button id="ai-send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </aside>
  </div>

  <!-- Monaco Editor Loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>

  <script type="module" src="/main.js"></script>
</body>

</html>
